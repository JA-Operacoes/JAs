# Configuração base = PRODUÇÃO.
#   Produção:      docker compose -f compose.yaml up -d --build
#   Desenvolvimento: docker compose up --build   (aplica automaticamente compose.override.yaml)
#
# As variáveis abaixo têm default, mas são sobrescritas pelo .env do diretório
# (o Compose lê o .env automaticamente para substituição de variáveis).
services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-123}
      POSTGRES_DB: ${DB_NAME:-JA}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Restaura o dump mais recente no PRIMEIRO up (banco vazio). Depois disso o
      # volume db_data já existe e o script não roda de novo.
      # Montamos a PASTA de backups (uma subpasta, pra o Postgres não tentar
      # auto-executar os arquivos); o script abaixo escolhe o backup mais novo e
      # restaura via pg_restore (formato custom do pg_dump -Fc).
      - "C:/Users/user/Backup Local:/docker-entrypoint-initdb.d/backups:ro"
      - ./db/init-restore.sh:/docker-entrypoint-initdb.d/10-restore.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-JA}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jasystem_network

  app:
    image: jasystem
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
      DB_HOST: db          # nome do serviço do Postgres na rede do Compose
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-123}
      DB_NAME: ${DB_NAME:-JA}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-troque_esta_chave}
      APP_ENV: ${APP_ENV:-}   # vazio em prod/local; "teste" liga o banner de aviso
    volumes:
      - uploads_data:/usr/src/app/uploads   # arquivos enviados persistem
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jasystem_network

volumes:
  db_data:
  uploads_data:

networks:
  jasystem_network:
    driver: bridge
