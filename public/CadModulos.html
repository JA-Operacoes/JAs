<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="css/MensagensSwal/mensagensSwal.css"> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<link rel="stylesheet" href="css/Roots/Roots.css">
<link rel="stylesheet" href="css/Modal/CadModulos.css">

    <div id="cadModalModulos" class="modal">
        <div class="modal-content">

            <div class="Close"><button class="close" id="Fechar"> X </button></div>
            <div id="form-modulos">
                <div class="title">
                    <h1>Cadastro de Modulos</h1>
                </div>

                <form id="modulos" name="form" autocomplete="off"> 

                    <fieldset>
                        <legend>Cadastre Modulos</legend>
                        <div class ="form">
                            <input type="text" name="idModulo" id="idModulo" readonly spellcheck="false">
                            <label for="idModulo">ID Modulos</label>
                        </div>
                        <div class="form">
                            <input type="text" id="nmModulo" required>
                            <label for="nmModulo">Nomes dos Modulos</label>
                        </div>                       
                        <select id="empresas-select-multiplo" name="empresasSelecionadas" multiple size="5" class="form"></select>
                    </fieldset>

                </div>
                    <div class="BTNs">
                        <button class="btnPesquisar" id="Pesquisar" type="button">Pesquisar</button>
                        <button class="btnLimpar" id="Limpar" type="button">Limpar</button>
                        <button class="btnEnviar" id="Enviar" type="button">Enviar</button>
                    </div>
                </form>
            </div>
        </div>        
    </div>
</html>
